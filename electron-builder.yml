appId: com.helloworld05.thunder-https
productName: Thunder HTTPS
directories:
  output: dist-output
  buildResources: build
files:
  - src/main/**/*
  - src/preload/**/*
  - dist/renderer/**/*
  - package.json
win:
  target:
    - target: nsis
      arch: [x64]
  icon: build/icon.png
mac:
  target:
    - target: dmg
      arch: [arm64, x64]
  icon: build/icon.png
linux:
  target:
    - target: AppImage
      arch: [x64]
  icon: build/icon.png
nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
